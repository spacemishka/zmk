# Enable encoder support
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable OLED display
CONFIG_ZMK_DISPLAY=y

# Uncomment to enable RGB underglow
# Note: Requires board-specific overlay with RGB configuration
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Increase BLE transmit power for better connectivity
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable nice!view support (alternative display)
# CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
